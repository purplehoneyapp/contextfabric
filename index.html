<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContextFabric</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --sidebar-bg: #252526;
            --text-color: #cccccc;
            --text-highlight: #ffffff;
            --accent-color: #007acc;
            --hover-bg: #2a2d2e;
            --border-color: #3c3c3c;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            height: 100vh;
            overflow: hidden;
            width: 100vw;
        }

        /* --- Left Sidebar (Presets) --- */
        .sidebar {
            width: 20%; /* 👈 CHANGED to 20% */
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        /* --- Main Content (File Tree) --- */
        .main-content {
            width: 40%; /* 👈 CHANGED to 40% */
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* --- Right Sidebar (Selected Files) --- */
        .right-sidebar {
            width: 40%; /* 👈 CHANGED to 40% */
            background-color: var(--sidebar-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 15px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--sidebar-bg);
        }

        .preset-list, .selected-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .preset-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            cursor: pointer; /* 👈 Cursor applies to the whole row now */
            border-radius: 4px;
            font-size: 14px;
            border-left: 3px solid transparent; 
        }

        .preset-item:hover { background-color: var(--hover-bg); }
        
        .preset-item.active {
            background-color: #004a77;
            color: white;
            border-left: 3px solid #4daafc;
        }
        .preset-item.active:hover { background-color: #005a91; }
        .preset-item.active .preset-delete { color: #ff9999; }

        .preset-delete { 
            color: #f48771; 
            cursor: pointer; 
            font-weight: bold; 
            padding-left: 10px; /* added a little padding so it's easier to click */
        }

        .selected-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 6px 8px;
            font-size: 13px;
            border-bottom: 1px solid #333;
            word-break: break-all;
        }
        .selected-item:hover { background-color: var(--hover-bg); }
        .selected-remove { color: #f48771; cursor: pointer; font-weight: bold; margin-left: 10px; padding: 0 4px; }

        .panel-footer {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            background-color: var(--sidebar-bg);
        }

        .panel-footer input {
            width: 100%;
            padding: 6px;
            margin-bottom: 8px;
            box-sizing: border-box;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 3px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .search-bar {
            width: 100%;
            max-width: 400px;
            padding: 8px 12px;
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 4px;
            outline: none;
        }

        .search-bar:focus { border-color: var(--accent-color); }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            width: 100%;
        }

        .btn:hover { background-color: #005f9e; }
        .btn:disabled { background-color: #555; cursor: not-allowed; }

        /* --- Tree View --- */
        .tree-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            font-family: Consolas, "Courier New", monospace;
            font-size: 14px;
        }

        ul { list-style-type: none; padding-left: 20px; margin: 0; }
        li { margin: 4px 0; }
        
        .tree-node {
            display: flex;
            align-items: center;
            padding: 4px;
            border-radius: 3px;
        }

        .tree-node:hover { background-color: var(--hover-bg); }

        .toggle-icon {
            width: 16px;
            text-align: center;
            cursor: pointer;
            display: inline-block;
            user-select: none;
            margin-right: 4px;
            font-size: 12px;
        }

        .folder-empty { width: 16px; display: inline-block; }

        input[type="checkbox"] { margin-right: 8px; cursor: pointer; }

        .file-label { cursor: pointer; user-select: none; color: var(--text-highlight); }
        .hidden { display: none !important; }

        #status-message {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            color: #89d185;
            text-align: center;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">Saved Presets</div>
        <div class="preset-list" id="preset-list"></div>
        <div class="panel-footer">
            <input type="text" id="preset-name" placeholder="New Preset Name...">
            <button class="btn" onclick="savePreset()">Save Selection</button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <input type="text" class="search-bar" id="search-input" placeholder="Search files (e.g. processor.go)..." onkeyup="filterTree()">
        </div>
        <div class="tree-container" id="tree-container">
            Loading project files...
        </div>
    </div>

    <div class="right-sidebar">
        <div class="sidebar-header">Selected Files (<span id="selected-count">0</span>)</div>
        <div class="selected-list" id="selected-files-list">
            <div style="padding: 10px; color: #777; font-size: 13px; text-align: center;">No files selected</div>
        </div>
        <div class="panel-footer">
            <span id="status-message"></span>
            <button class="btn" id="generate-btn" onclick="generateContext()">Generate Context</button>
        </div>
    </div>

    <script>
        let fileData = null;
        let currentPresets = {}; 
        
        let activePreset = null;
        let isApplyingPreset = false;

        async function loadTree() {
            try {
                const response = await fetch('/api/tree');
                fileData = await response.json();
                const container = document.getElementById('tree-container');
                container.innerHTML = ''; 
                
                const rootUl = document.createElement('ul');
                rootUl.style.paddingLeft = '0';
                if (fileData.children) {
                    fileData.children.forEach(child => {
                        rootUl.appendChild(createTreeNode(child));
                    });
                }
                container.appendChild(rootUl);
                
                await fetchPresets(); 
                updateSelectedView();
            } catch (err) {
                document.getElementById('tree-container').innerText = 'Failed to load project tree.';
                console.error(err);
            }
        }

        function createTreeNode(node) {
            const li = document.createElement('li');
            li.dataset.name = node.name.toLowerCase();

            const nodeDiv = document.createElement('div');
            nodeDiv.className = 'tree-node';

            if (node.isDir) {
                const caret = document.createElement('span');
                caret.className = 'toggle-icon';
                caret.innerText = '▶'; 
                caret.onclick = (e) => {
                    const childUl = li.querySelector('ul');
                    if (childUl) {
                        childUl.classList.toggle('hidden');
                        caret.innerText = childUl.classList.contains('hidden') ? '▶' : '▼';
                    }
                };
                nodeDiv.appendChild(caret);
            } else {
                const empty = document.createElement('span');
                empty.className = 'folder-empty';
                nodeDiv.appendChild(empty);
            }

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.dataset.path = node.path;
            checkbox.dataset.isdir = node.isDir;
            checkbox.onchange = (e) => handleCheck(e.target, li);
            nodeDiv.appendChild(checkbox);

            const label = document.createElement('span');
            label.className = 'file-label';
            label.innerText = node.name;
            label.onclick = () => checkbox.click();
            nodeDiv.appendChild(label);

            li.appendChild(nodeDiv);

            if (node.isDir && node.children) {
                const ul = document.createElement('ul');
                ul.classList.add('hidden'); 
                node.children.forEach(child => {
                    ul.appendChild(createTreeNode(child));
                });
                li.appendChild(ul);
            }

            return li;
        }

        function handleCheck(checkbox, liNode) {
            if (!isApplyingPreset && activePreset !== null) {
                activePreset = null;
                renderPresets();
            }

            const isChecked = checkbox.checked;
            const childCheckboxes = liNode.querySelectorAll('input[type="checkbox"]');
            childCheckboxes.forEach(cb => cb.checked = isChecked);
            updateSelectedView();
        }

        function updateSelectedView() {
            const list = document.getElementById('selected-files-list');
            list.innerHTML = '';
            
            const selectedFiles = Array.from(document.querySelectorAll('input[type="checkbox"]:checked[data-isdir="false"]'))
                                       .map(cb => cb.dataset.path);
            
            document.getElementById('selected-count').innerText = selectedFiles.length;

            if (selectedFiles.length === 0) {
                list.innerHTML = '<div style="padding: 10px; color: #777; font-size: 13px; text-align: center;">No files selected</div>';
                return;
            }

            selectedFiles.forEach(path => {
                const div = document.createElement('div');
                div.className = 'selected-item';
                
                const spanPath = document.createElement('span');
                spanPath.innerText = path;
                
                const spanDel = document.createElement('span');
                spanDel.className = 'selected-remove';
                spanDel.innerText = '×';
                spanDel.onclick = () => {
                    const cb = document.querySelector(`input[data-path="${path}"]`);
                    if(cb) {
                        cb.checked = false;
                        const liNode = cb.closest('li');
                        handleCheck(cb, liNode); 
                    }
                };

                div.appendChild(spanPath);
                div.appendChild(spanDel);
                list.appendChild(div);
            });
        }

        function filterTree() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const rootUl = document.querySelector('#tree-container > ul');
            if (!rootUl) return;
            filterNode(rootUl, query);
        }

        function filterNode(ul, query) {
            let hasVisibleChild = false;
            const items = ul.children;
            
            for (let i = 0; i < items.length; i++) {
                const li = items[i];
                const name = li.dataset.name;
                const childUl = li.querySelector('ul');
                
                let matchesQuery = name.includes(query);
                let childMatches = false;

                if (childUl) childMatches = filterNode(childUl, query);

                if (matchesQuery || childMatches || query === '') {
                    li.classList.remove('hidden');
                    hasVisibleChild = true;
                    if (query !== '' && childUl) {
                        childUl.classList.remove('hidden');
                        li.querySelector('.toggle-icon').innerText = '▼';
                    }
                } else {
                    li.classList.add('hidden');
                }
            }
            return hasVisibleChild;
        }

        async function fetchPresets() {
            try {
                const res = await fetch('/api/presets');
                if (res.ok) {
                    currentPresets = await res.json() || {};
                    renderPresets();
                }
            } catch (err) {
                console.error("Failed to fetch presets:", err);
            }
        }

        async function savePresetsToServer() {
            try {
                const res = await fetch('/api/presets', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(currentPresets)
                });
                if (!res.ok) throw new Error("Failed to save to server");
            } catch (err) {
                alert("Could not save preset to .context-presets.yaml");
                console.error(err);
            }
        }

        function renderPresets() {
            const list = document.getElementById('preset-list');
            list.innerHTML = '';
            
            for (const [name, paths] of Object.entries(currentPresets)) {
                const div = document.createElement('div');
                div.className = 'preset-item' + (activePreset === name ? ' active' : '');
                
                // 👈 CHANGED: Moved onclick from span to the whole div
                div.onclick = () => {
                    activePreset = name; 
                    applyPreset(paths);
                    renderPresets(); 
                };
                
                const titleSpan = document.createElement('span');
                titleSpan.innerText = name;
                
                const delSpan = document.createElement('span');
                delSpan.className = 'preset-delete';
                delSpan.innerText = '×';
                delSpan.onclick = async (e) => {
                    e.stopPropagation(); // 👈 Ensures the div's onclick above doesn't fire
                    delete currentPresets[name];
                    if (activePreset === name) activePreset = null;
                    await savePresetsToServer();
                    renderPresets();
                };

                div.appendChild(titleSpan);
                div.appendChild(delSpan);
                list.appendChild(div);
            }
        }

        async function savePreset() {
            const input = document.getElementById('preset-name');
            const name = input.value.trim();
            if (!name) return alert("Enter a preset name");

            const selected = Array.from(document.querySelectorAll('input[type="checkbox"]:checked[data-isdir="false"]'))
                                .map(cb => cb.dataset.path);
            
            if (selected.length === 0) return alert("Select some files first!");

            currentPresets[name] = selected;
            activePreset = name; 
            await savePresetsToServer();
            
            input.value = '';
            renderPresets();
        }

        function applyPreset(paths) {
            isApplyingPreset = true; 
            
            document.querySelectorAll('#tree-container ul ul').forEach(ul => {
                ul.classList.add('hidden');
            });
            document.querySelectorAll('#tree-container .toggle-icon').forEach(icon => {
                icon.innerText = '▶';
            });
            
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            
            paths.forEach(p => {
                const cb = document.querySelector(`input[data-path="${p}"]`);
                if (cb) {
                    cb.checked = true;
                    
                    const liNode = cb.closest('li');
                    if (liNode) {
                        handleCheck(cb, liNode);
                    }
                    
                    let currentLi = cb.closest('li');
                    while (currentLi) {
                        const parentUl = currentLi.parentElement;
                        if (parentUl && parentUl.classList.contains('hidden')) {
                            parentUl.classList.remove('hidden');
                            const parentLi = parentUl.closest('li');
                            if (parentLi) {
                                const toggle = parentLi.querySelector('.toggle-icon');
                                if (toggle) toggle.innerText = '▼';
                            }
                        }
                        currentLi = parentUl ? parentUl.closest('li') : null;
                    }
                }
            });
            
            isApplyingPreset = false;
            updateSelectedView();
        }

        async function generateContext() {
            const btn = document.getElementById('generate-btn');
            const status = document.getElementById('status-message');
            
            const selectedFiles = Array.from(document.querySelectorAll('input[type="checkbox"]:checked[data-isdir="false"]'))
                                       .map(cb => cb.dataset.path);

            if (selectedFiles.length === 0) {
                alert("Please select at least one file.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Generating...";
            status.innerText = "";

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ selectedPaths: selectedFiles })
                });

                if (!res.ok) throw new Error(await res.text());

                status.innerText = "Success! Files generated.";
                
                setTimeout(() => {
                    if (status.innerText.startsWith("Success")) {
                        status.innerText = "";
                    }
                }, 3000);
            } catch (err) {
                alert("Error generating context: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Generate Context";
            }
        }

        window.onload = loadTree;
    </script>
</body>
</html>
