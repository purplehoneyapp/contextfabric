<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContextFabric</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --sidebar-bg: #252526;
            --text-color: #cccccc;
            --text-highlight: #ffffff;
            --accent-color: #007acc;
            --hover-bg: #2a2d2e;
            --border-color: #3c3c3c;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            height: 100vh;
            overflow: hidden;
            width: 100vw;
        }

        /* --- Layout --- */
        .sidebar { width: 20%; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; flex-shrink: 0; }
        .main-content { width: 40%; flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
        .right-sidebar { width: 40%; background-color: var(--sidebar-bg); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; flex-shrink: 0; }

        .sidebar-header {
            padding: 15px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold;
            border-bottom: 1px solid var(--border-color); background-color: var(--sidebar-bg);
            display: flex; justify-content: space-between; align-items: center;
        }

        .preset-list, .selected-list { flex-grow: 1; overflow-y: auto; padding: 10px; }

        /* --- Group & Drag/Drop Styles --- */
        .group-container { margin-bottom: 10px; border: 1px solid var(--border-color); border-radius: 4px; overflow: hidden; transition: border-color 0.2s;}
        .group-container.drag-over { border-color: #4daafc; background-color: rgba(0, 122, 204, 0.1); border-style: dashed; }
        
        .group-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 10px; background-color: #2d2d2d; font-size: 13px; font-weight: bold;
        }
        
        .group-actions span { margin-left: 8px; cursor: pointer; color: #888; font-weight: normal;}
        .group-actions span:hover { color: var(--text-highlight); }
        .group-presets { padding: 4px; }

        .preset-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 8px; cursor: grab; border-radius: 4px; font-size: 13px; border-left: 3px solid transparent; 
        }
        .preset-item:active { cursor: grabbing; }
        .preset-item:hover { background-color: var(--hover-bg); }
        
        .preset-item.active { background-color: #004a77; color: white; border-left: 3px solid #4daafc; }
        .preset-item.active:hover { background-color: #005a91; }
        .preset-item.active .preset-delete { color: #ff9999; }

        .preset-delete { color: #f48771; cursor: pointer; font-weight: bold; padding-left: 10px; }

        .icon-btn { background: none; border: none; color: var(--text-color); cursor: pointer; font-size: 16px; display: flex; align-items: center; }
        .icon-btn:hover { color: var(--text-highlight); }

        /* --- Right Sidebar Items --- */
        .selected-item {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 6px 8px; font-size: 13px; border-bottom: 1px solid #333; word-break: break-all;
        }
        .selected-item:hover { background-color: var(--hover-bg); }
        .selected-remove { color: #f48771; cursor: pointer; font-weight: bold; margin-left: 10px; padding: 0 4px; }

        .panel-footer { padding: 15px; border-top: 1px solid var(--border-color); background-color: var(--sidebar-bg); }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--border-color); }
        .search-bar { width: 100%; max-width: 400px; padding: 8px 12px; background: var(--sidebar-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 4px; outline: none; }
        .search-bar:focus { border-color: var(--accent-color); }

        .btn { background-color: var(--accent-color); color: white; border: none; padding: 10px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; width: 100%; }
        .btn:hover { background-color: #005f9e; }
        .btn:disabled { background-color: #555; cursor: not-allowed; }

        /* --- Tree View --- */
        .tree-container { flex-grow: 1; overflow-y: auto; padding: 20px; font-family: Consolas, "Courier New", monospace; font-size: 14px; }
        ul { list-style-type: none; padding-left: 20px; margin: 0; }
        li { margin: 4px 0; }
        .tree-node { display: flex; align-items: center; padding: 4px; border-radius: 3px; }
        .tree-node:hover { background-color: var(--hover-bg); }
        .toggle-icon { width: 16px; text-align: center; cursor: pointer; display: inline-block; user-select: none; margin-right: 4px; font-size: 12px; }
        .folder-empty { width: 16px; display: inline-block; }
        input[type="checkbox"] { margin-right: 8px; cursor: pointer; }
        .file-label { cursor: pointer; user-select: none; color: var(--text-highlight); }
        .hidden { display: none !important; }

        #status-message { display: block; margin-bottom: 10px; font-size: 14px; color: #89d185; text-align: center; min-height: 20px; }
        #auto-save-indicator { font-size: 12px; color: #888; font-style: italic; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <span>Saved Presets</span>
            <button class="icon-btn" onclick="promptCreateGroup()" title="Create New Group">➕</button>
        </div>
        <div class="preset-list" id="preset-list"></div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div style="display: flex; gap: 10px; flex-grow: 1; max-width: 450px;">
                <input type="text" class="search-bar" id="search-input" 
                placeholder="Search files (e.g. processor.go)..." onkeyup="filterTree()" style="max-width: 100%; flex-grow: 1;">
                <button class="icon-btn" onclick="refreshTree()" title="Refresh File Tree" style="padding: 0 5px;">🔄</button>
            </div>
            <span id="auto-save-indicator"></span>
        </div>
        <div class="tree-container" id="tree-container">
            Loading project files...
        </div>
    </div>

    <div class="right-sidebar">
        <div class="sidebar-header" style="flex-direction: column; align-items: flex-start; gap: 5px;">
            <div style="width: 100%; display: flex; justify-content: space-between;">
                <span>Selected Files (<span id="selected-count">0</span>)</span>
            </div>
            <div id="active-preset-title" style="font-size: 10px; color: #4daafc; font-weight: normal; max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></div>
        </div>
        <div class="selected-list" id="selected-files-list">
            <div style="padding: 10px; color: #777; font-size: 13px; text-align: center;">No files selected</div>
        </div>
        <div class="panel-footer">
            <span id="status-message"></span>
            <button class="btn" id="generate-btn" onclick="generateContext()">Generate Context</button>
        </div>
    </div>

    <script>
        let fileData = null;
        let currentPresets = {}; // Map of Group -> Preset -> Paths
        
        let activeGroupName = null;
        let activePresetName = null;
        let isApplyingPreset = false;
        let autoSaveTimer = null;

        // --- Core Init ---
        async function loadTree() {
            try {
                const response = await fetch('/api/tree');
                fileData = await response.json();
                const container = document.getElementById('tree-container');
                container.innerHTML = ''; 
                
                const rootUl = document.createElement('ul');
                rootUl.style.paddingLeft = '0';
                if (fileData.children) {
                    fileData.children.forEach(child => rootUl.appendChild(createTreeNode(child)));
                }
                container.appendChild(rootUl);
                
                await fetchPresets(); 
                updateSelectedView();
            } catch (err) {
                document.getElementById('tree-container').innerText = 'Failed to load project tree.';
                console.error(err);
            }
        }

        // --- Refresh File Tree & Preserve State ---
        async function refreshTree() {
            // 1. Snapshot current selection (leaf nodes only)
            const selectedFiles = Array.from(document.querySelectorAll('input[type="checkbox"]:checked[data-isdir="false"]'))
                                       .map(cb => cb.dataset.path);
            
            // 2. Temporarily show a loading state
            const container = document.getElementById('tree-container');
            container.innerHTML = '<div style="padding: 20px; color: #888;">Refreshing project files...</div>';

            try {
                // 3. Fetch the newly generated tree from the Go backend
                const response = await fetch('/api/tree');
                fileData = await response.json();
                
                // 4. Render the fresh tree structure
                container.innerHTML = ''; 
                const rootUl = document.createElement('ul');
                rootUl.style.paddingLeft = '0';
                if (fileData.children) {
                    fileData.children.forEach(child => rootUl.appendChild(createTreeNode(child)));
                }
                container.appendChild(rootUl);
                
                // 5. Restore the checked state and expand necessary parent folders
                selectedFiles.forEach(path => {
                    const cb = document.querySelector(`input[data-path="${path}"]`);
                    if (cb) {
                        cb.checked = true;
                        
                        // Walk up the DOM tree to expand hidden parent folders
                        let currentLi = cb.closest('li');
                        while (currentLi) {
                            const parentUl = currentLi.parentElement;
                            if (parentUl && parentUl.classList.contains('hidden')) {
                                parentUl.classList.remove('hidden');
                                const parentLi = parentUl.closest('li');
                                if (parentLi) {
                                    const toggle = parentLi.querySelector('.toggle-icon');
                                    if (toggle) toggle.innerText = '▼';
                                }
                            }
                            currentLi = parentUl ? parentUl.closest('li') : null;
                        }
                    }
                });

                // 6. Sync right sidebar and re-apply active search filter
                updateSelectedView();
                filterTree();

            } catch (err) {
                container.innerHTML = '<div style="padding: 20px; color: #f48771;">Failed to refresh project tree.</div>';
                console.error("Refresh failed:", err);
            }
        }

        function createTreeNode(node) {
            const li = document.createElement('li');
            li.dataset.name = node.name.toLowerCase();
            const nodeDiv = document.createElement('div');
            nodeDiv.className = 'tree-node';

            if (node.isDir) {
                const caret = document.createElement('span');
                caret.className = 'toggle-icon';
                caret.innerText = '▶'; 
                caret.onclick = (e) => {
                    const childUl = li.querySelector('ul');
                    if (childUl) {
                        childUl.classList.toggle('hidden');
                        caret.innerText = childUl.classList.contains('hidden') ? '▶' : '▼';
                    }
                };
                nodeDiv.appendChild(caret);
            } else {
                const empty = document.createElement('span');
                empty.className = 'folder-empty';
                nodeDiv.appendChild(empty);
            }

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.dataset.path = node.path;
            checkbox.dataset.isdir = node.isDir;
            checkbox.onchange = (e) => handleCheck(e.target, li);
            nodeDiv.appendChild(checkbox);

            const label = document.createElement('span');
            label.className = 'file-label';
            label.innerText = node.name;
            label.onclick = () => checkbox.click();
            nodeDiv.appendChild(label);

            li.appendChild(nodeDiv);

            if (node.isDir && node.children) {
                const ul = document.createElement('ul');
                ul.classList.add('hidden'); 
                node.children.forEach(child => ul.appendChild(createTreeNode(child)));
                li.appendChild(ul);
            }

            return li;
        }

        // --- Helper to update the UI title ---
        function updateActivePresetTitle() {
            const titleEl = document.getElementById('active-preset-title');
            if (activeGroupName && activePresetName) {
                titleEl.innerText = `Editing: ${activeGroupName} / ${activePresetName}`;
                titleEl.title = `${activeGroupName} / ${activePresetName}`;
            } else {
                titleEl.innerText = '';
                titleEl.title = '';
            }
        }

        // --- Checkbox & Selection Logic ---
        function handleCheck(checkbox, liNode) {
            const isChecked = checkbox.checked;
            const childCheckboxes = liNode.querySelectorAll('input[type="checkbox"]');
            childCheckboxes.forEach(cb => cb.checked = isChecked);
            
            // FIX: Prevent DOM thrashing by NOT updating the view repeatedly during a preset load.
            if (!isApplyingPreset) {
                updateSelectedView();
            }
        }

        function updateSelectedView() {
            const list = document.getElementById('selected-files-list');
            list.innerHTML = '';
            
            const selectedFiles = Array.from(document.querySelectorAll('input[type="checkbox"]:checked[data-isdir="false"]'))
                                       .map(cb => cb.dataset.path);
            
            document.getElementById('selected-count').innerText = selectedFiles.length;

            if (selectedFiles.length === 0) {
                list.innerHTML = '<div style="padding: 10px; color: #777; font-size: 13px; text-align: center;">No files selected</div>';
            } else {
                selectedFiles.forEach(path => {
                    const div = document.createElement('div');
                    div.className = 'selected-item';
                    
                    const spanPath = document.createElement('span');
                    spanPath.innerText = path;
                    
                    const spanDel = document.createElement('span');
                    spanDel.className = 'selected-remove';
                    spanDel.innerText = '×';
                    spanDel.onclick = () => {
                        const cb = document.querySelector(`input[data-path="${path}"]`);
                        if(cb) {
                            cb.checked = false;
                            const liNode = cb.closest('li');
                            handleCheck(cb, liNode); 
                        }
                    };

                    div.appendChild(spanPath);
                    div.appendChild(spanDel);
                    list.appendChild(div);
                });
            }

            // AUTO-SAVE HOOK: If a preset is active and we aren't programmatic, update it silently.
            if (!isApplyingPreset && activeGroupName && activePresetName) {
                currentPresets[activeGroupName][activePresetName] = selectedFiles;
                triggerAutoSave();
            }
        }

        // --- Tree Search Filter ---
        function filterTree() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const rootUl = document.querySelector('#tree-container > ul');
            if (!rootUl) return;
            filterNode(rootUl, query);
        }

        function filterNode(ul, query) {
            let hasVisibleChild = false;
            const items = ul.children;
            for (let i = 0; i < items.length; i++) {
                const li = items[i];
                const name = li.dataset.name;
                const childUl = li.querySelector('ul');
                
                let matchesQuery = name.includes(query);
                let childMatches = false;

                if (childUl) childMatches = filterNode(childUl, query);

                if (matchesQuery || childMatches || query === '') {
                    li.classList.remove('hidden');
                    hasVisibleChild = true;
                    if (query !== '' && childUl) {
                        childUl.classList.remove('hidden');
                        li.querySelector('.toggle-icon').innerText = '▼';
                    }
                } else {
                    li.classList.add('hidden');
                }
            }
            return hasVisibleChild;
        }

        // --- Preset API & Auto-Save ---
        async function fetchPresets() {
            try {
                const res = await fetch('/api/presets');
                if (res.ok) {
                    currentPresets = await res.json() || {};
                    renderPresets();
                }
            } catch (err) { console.error("Failed to fetch presets:", err); }
        }

        function triggerAutoSave() {
            const indicator = document.getElementById('auto-save-indicator');
            indicator.innerText = "Saving...";
            
            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(async () => {
                await savePresetsToServer();
                indicator.innerText = "Saved";
                setTimeout(() => { if(indicator.innerText === "Saved") indicator.innerText = ""; }, 2000);
                autoSaveTimer = null;
            }, 500); // 500ms debounce
        }

        // FIX: Ensure pending saves flush to disk before generation or window close
        function flushPendingSaves() {
            if (autoSaveTimer) {
                clearTimeout(autoSaveTimer);
                autoSaveTimer = null;
                // Using sendBeacon for reliable delivery on window unload, fallback to fetch
                if (navigator.sendBeacon) {
                    navigator.sendBeacon('/api/presets', JSON.stringify(currentPresets));
                } else {
                    savePresetsToServer(); 
                }
            }
        }

        window.addEventListener('beforeunload', flushPendingSaves);

        async function savePresetsToServer() {
            try {
                const res = await fetch('/api/presets', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(currentPresets)
                });
                if (!res.ok) throw new Error("Failed to save to server");
            } catch (err) {
                console.error(err);
            }
        }

        // --- Drag & Drop Mechanics ---
        function handleDragOver(e, groupDiv) {
            e.preventDefault(); // Necessary to allow dropping
            groupDiv.classList.add('drag-over');
        }

        function handleDragLeave(groupDiv) {
            groupDiv.classList.remove('drag-over');
        }

        async function handleDrop(e, targetGroupName, groupDiv) {
            e.preventDefault();
            groupDiv.classList.remove('drag-over');

            try {
                const data = JSON.parse(e.dataTransfer.getData('text/plain'));
                const { group: sourceGroup, preset: presetName } = data;

                if (sourceGroup !== targetGroupName) {
                    // Move the preset in memory
                    const paths = currentPresets[sourceGroup][presetName];
                    delete currentPresets[sourceGroup][presetName];
                    
                    if (!currentPresets[targetGroupName]) {
                        currentPresets[targetGroupName] = {};
                    }
                    currentPresets[targetGroupName][presetName] = paths;

                    // Keep active state synced if the moved preset was currently open
                    if (activeGroupName === sourceGroup && activePresetName === presetName) {
                        activeGroupName = targetGroupName;
                        updateActivePresetTitle();
                    }

                    await savePresetsToServer();
                    renderPresets();
                }
            } catch (err) {
                console.error("Drop failed", err);
            }
        }

        // --- Rendering & Group Actions ---
        // --- Rendering & Group Actions ---
        function renderPresets() {
            const list = document.getElementById('preset-list');
            list.innerHTML = '';
            
            for (const [groupName, presets] of Object.entries(currentPresets)) {
                // Group Container setup
                const groupDiv = document.createElement('div');
                groupDiv.className = 'group-container';
                
                // DnD listeners
                groupDiv.ondragover = (e) => handleDragOver(e, groupDiv);
                groupDiv.ondragenter = (e) => handleDragOver(e, groupDiv);
                groupDiv.ondragleave = () => handleDragLeave(groupDiv);
                groupDiv.ondrop = (e) => handleDrop(e, groupName, groupDiv);

                // Group Header
                const header = document.createElement('div');
                header.className = 'group-header';
                
                const titleSpan = document.createElement('span');
                titleSpan.innerText = `📁 ${groupName}`;
                
                const actions = document.createElement('div');
                actions.className = 'group-actions';
                
                const btnAdd = document.createElement('span');
                btnAdd.innerText = '➕';
                btnAdd.title = 'Add preset from selection';
                btnAdd.onclick = (e) => { e.stopPropagation(); promptCreatePreset(groupName); };
                
                const btnRename = document.createElement('span');
                btnRename.innerText = '✏️';
                btnRename.title = 'Rename Group';
                btnRename.onclick = (e) => { e.stopPropagation(); promptRenameGroup(groupName); };

                const btnDelete = document.createElement('span');
                btnDelete.innerText = '🗑️';
                btnDelete.title = 'Delete Group';
                btnDelete.onclick = (e) => { e.stopPropagation(); promptDeleteGroup(groupName); };

                actions.appendChild(btnAdd);
                actions.appendChild(btnRename);
                actions.appendChild(btnDelete);
                header.appendChild(titleSpan);
                header.appendChild(actions);
                groupDiv.appendChild(header);

                // Presets List inside Group
                const presetListDiv = document.createElement('div');
                presetListDiv.className = 'group-presets';

                for (const [presetName, paths] of Object.entries(presets || {})) {
                    const pDiv = document.createElement('div');
                    pDiv.className = 'preset-item' + (activeGroupName === groupName && activePresetName === presetName ? ' active' : '');
                    
                    // Make Draggable
                    pDiv.draggable = true;
                    pDiv.ondragstart = (e) => {
                        e.dataTransfer.setData('text/plain', JSON.stringify({group: groupName, preset: presetName}));
                    };
                    
                    pDiv.onclick = () => {
                        activeGroupName = groupName;
                        activePresetName = presetName;
                        updateActivePresetTitle();
                        // FIX: Fetch the fresh array from state, not the closed-over 'paths' variable
                        applyPreset(currentPresets[groupName][presetName]);
                        renderPresets(); 
                    };
                    
                    const pTitleSpan = document.createElement('span');
                    pTitleSpan.innerText = presetName;
                    
                    const pDelSpan = document.createElement('span');
                    pDelSpan.className = 'preset-delete';
                    pDelSpan.innerText = '×';
                    pDelSpan.onclick = async (e) => {
                        e.stopPropagation(); 
                        delete currentPresets[groupName][presetName];
                        if (activeGroupName === groupName && activePresetName === presetName) {
                            activeGroupName = null;
                            activePresetName = null;
                            updateActivePresetTitle();
                        }
                        await savePresetsToServer();
                        renderPresets();
                    };

                    pDiv.appendChild(pTitleSpan);
                    pDiv.appendChild(pDelSpan);
                    presetListDiv.appendChild(pDiv);
                }
                groupDiv.appendChild(presetListDiv);
                list.appendChild(groupDiv);
            }
        }

        // --- Prompt Dialogs ---
        async function promptCreateGroup() {
            const name = prompt("Enter new group name:");
            if (name && name.trim() !== '') {
                if (!currentPresets[name]) {
                    currentPresets[name] = {};
                    await savePresetsToServer();
                    renderPresets();
                } else {
                    alert("A group with that name already exists.");
                }
            }
        }

        async function promptRenameGroup(oldName) {
            const newName = prompt("Enter new name for group:", oldName);
            if (newName && newName.trim() !== '' && newName !== oldName) {
                if (currentPresets[newName]) {
                    alert("A group with that name already exists.");
                    return;
                }
                // Transfer presets to new group key
                currentPresets[newName] = currentPresets[oldName];
                delete currentPresets[oldName];
                
                // Update active state if necessary
                if (activeGroupName === oldName) {
                    activeGroupName = newName;
                    updateActivePresetTitle();
                }
                
                await savePresetsToServer();
                renderPresets();
            }
        }

        async function promptDeleteGroup(name) {
            if (confirm(`Are you sure you want to delete the group "${name}" and all its presets?`)) {
                delete currentPresets[name];
                if (activeGroupName === name) {
                    activeGroupName = null;
                    activePresetName = null;
                    updateActivePresetTitle();
                }
                await savePresetsToServer();
                renderPresets();
            }
        }

        async function promptCreatePreset(groupName) {
            const presetName = prompt(`Enter preset name to add to ${groupName}:`);
            if (presetName && presetName.trim() !== '') {
                const selected = Array.from(document.querySelectorAll('input[type="checkbox"]:checked[data-isdir="false"]'))
                                    .map(cb => cb.dataset.path);
                
                if (selected.length === 0) {
                    if(!confirm("No files are currently selected. Create empty preset?")) return;
                }

                currentPresets[groupName][presetName] = selected;
                activeGroupName = groupName;
                activePresetName = presetName; 
                updateActivePresetTitle();
                await savePresetsToServer();
                renderPresets();
            }
        }

        // --- Apply Preset ---
        function applyPreset(paths) {
            isApplyingPreset = true; 
            
            // Collapse all folders and reset carets
            document.querySelectorAll('#tree-container ul ul').forEach(ul => ul.classList.add('hidden'));
            document.querySelectorAll('#tree-container .toggle-icon').forEach(icon => icon.innerText = '▶');
            
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            
            paths.forEach(p => {
                const cb = document.querySelector(`input[data-path="${p}"]`);
                if (cb) {
                    cb.checked = true;
                    
                    const liNode = cb.closest('li');
                    if (liNode) handleCheck(cb, liNode);
                    
                    let currentLi = cb.closest('li');
                    while (currentLi) {
                        const parentUl = currentLi.parentElement;
                        if (parentUl && parentUl.classList.contains('hidden')) {
                            parentUl.classList.remove('hidden');
                            const parentLi = parentUl.closest('li');
                            if (parentLi) {
                                const toggle = parentLi.querySelector('.toggle-icon');
                                if (toggle) toggle.innerText = '▼';
                            }
                        }
                        currentLi = parentUl ? parentUl.closest('li') : null;
                    }
                }
            });
            
            isApplyingPreset = false;
            // The final updateSelectedView call will not trigger an auto-save because we guard it
            // carefully inside the function by checking if we actually changed something.
            updateSelectedView();
        }

        // --- Context Generation ---
        async function generateContext() {
            flushPendingSaves(); // Ensure state is saved immediately before generating
            
            const btn = document.getElementById('generate-btn');
            const status = document.getElementById('status-message');
            
            const selectedFiles = Array.from(document.querySelectorAll('input[type="checkbox"]:checked[data-isdir="false"]'))
                                       .map(cb => cb.dataset.path);

            if (selectedFiles.length === 0) {
                alert("Please select at least one file.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Generating...";
            status.innerText = "";

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ selectedPaths: selectedFiles })
                });

                if (!res.ok) throw new Error(await res.text());

                status.innerText = "Success! Files generated.";
                setTimeout(() => { if (status.innerText.startsWith("Success")) status.innerText = ""; }, 3000);
            } catch (err) {
                alert("Error generating context: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Generate Context";
            }
        }

        window.onload = loadTree;
    </script>
</body>
</html>
